# ============================================================
# Sigma Rule: Registry Run Key Persistence
# MITRE ATT&CK: T1547.001 — Boot/Logon Autostart: Registry Run Keys
# ============================================================
title: Registry Run Key Modification — Persistence
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: |
  Detects modification of registry Run keys commonly used for
  persistence. Sysmon Event 13 (RegistryEvent - Value Set) fires
  when a registry value is created or modified. Attackers write
  malicious executables to Run/RunOnce keys to survive reboots.
author: Dhruv Patel
date: 2025/06/25
references:
  - https://attack.mitre.org/techniques/T1547/001/
tags:
  - attack.persistence
  - attack.t1547.001
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    EventID: 13
    TargetObject|contains:
      - '\Software\Microsoft\Windows\CurrentVersion\Run'
      - '\Software\Microsoft\Windows\CurrentVersion\RunOnce'
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon'
  filter_legitimate:
    Image|endswith:
      - '\MsiExec.exe'
      - '\setup.exe'
      - '\install.exe'
      - '\msiexec.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - Software installers adding legitimate autostart entries
  - Antivirus or endpoint security tools
level: medium
fields:
  - TargetObject
  - Details
  - Image
  - User
