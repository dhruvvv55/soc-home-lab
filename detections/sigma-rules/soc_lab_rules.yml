# ============================================================
# Sigma Rule: PowerShell Encoded Command Execution
# MITRE ATT&CK: T1059.001 — Command and Scripting: PowerShell
# ============================================================
title: PowerShell Encoded Command Execution
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: |
  Detects PowerShell launched with an encoded command (-EncodedCommand
  or -enc). Attackers encode PowerShell commands in Base64 to evade
  signature-based detection and command-line logging. Combined with
  -WindowStyle Hidden and -NonInteractive, this is a classic attacker
  pattern for stealthy payload execution.
author: Dhruv Patel
date: 2025/06/25
references:
  - https://attack.mitre.org/techniques/T1059/001/
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -ec '
  condition: selection
falsepositives:
  - Legitimate administrative scripts that use encoded commands
  - SCCM/software deployment tools
level: medium
fields:
  - CommandLine
  - User
  - ParentImage
  - ParentCommandLine

